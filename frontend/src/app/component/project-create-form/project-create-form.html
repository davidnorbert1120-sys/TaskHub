<div class="container mt-4" style="max-width: 600px;">
  <h2 class="mb-4">Új projekt</h2>

  <form [formGroup]="projectForm" (ngSubmit)="onSubmit()" novalidate>

    <div class="mb-3">
      <label for="name" class="form-label">Név *</label>
      <input
        type="text"
        id="name"
        class="form-control"
        formControlName="name"
        [class.is-invalid]="fieldHasError('name', 'required') || fieldHasError('name', 'maxlength')"
      />
      <div *ngIf="fieldHasError('name', 'required')" class="invalid-feedback">
        A név megadása kötelező.
      </div>
      <div *ngIf="fieldHasError('name', 'maxlength')" class="invalid-feedback">
        A név legfeljebb 100 karakter lehet.
      </div>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Leírás</label>
      <textarea
        id="description"
        class="form-control"
        rows="4"
        formControlName="description"
        [class.is-invalid]="fieldHasError('description', 'maxlength')"
      ></textarea>
      <div *ngIf="fieldHasError('description', 'maxlength')" class="invalid-feedback">
        A leírás legfeljebb 1000 karakter lehet.
      </div>
    </div>

    <div *ngIf="globalError" class="alert alert-danger">
      {{ globalError }}
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="submitting">
        {{ submitting ? 'Mentés...' : 'Létrehozás' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="submitting">
        Mégse
      </button>
    </div>
  </form>
</div>
