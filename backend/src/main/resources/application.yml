spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:taskhub_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    jpa:
      repositories:
        enabled: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:changeme_use_a_long_random_string_in_production_min_256_bits}
    expiration-ms: 86400000  # 24 óra

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.taskhub: DEBUG
    org.hibernate.SQL: WARN
